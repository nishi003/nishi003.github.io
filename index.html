<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SF Neighbourhood Finder</title>
    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false },
        theme: {
          extend: {
            colors: {
              background: "#000000",
              text: "#FFFFFF",
              subtitle: "#B8B8B8",
              panel: "#171717",
              border: "#ffffff",
              "hover-border": "#faf9f6",
              inside: "#ffffff4d",
            },
            fontFamily: {
              roboto: ["Roboto", "sans-serif"],
              mulish: ["Mulish", "sans-serif"],
            },
            transitionTimingFunction: {
              ease: "cubic-bezier(0.4, 0, 0.2, 1)",
            },
          },
        },
      };
    </script>
    <!-- ICONSCOUT -->
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.0.0/css/line.css"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="./css/styles.css" />
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- D3 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  </head>
  <body class="overflow-hidden">
    <div class="bg-background flex flex-col h-full p-16 gap-4">
      <div class="w-full flex flex-col items-center justify-center gap-2">
        <p class="text-6xl font-semibold font-roboto text-white">BayMatch</p>
        <p class="text-2xl font-medium font-mulish text-white">
          Find out where you belong in San Francisco.
        </p>
      </div>
      <div class="flex flex-row flex-1 min-h-0">
        <div
          id="preferences-panel"
          class="w-fit h-full bg-panel rounded-[20px] flex flex-col p-[28px] gap-[24px]"
        ></div>
        <div id="map-container" class="col-6 h-100"></div>
        <div id="best-neighbourhood-container" class="col-3"></div>
      </div>
    </div>
    <!-- BOOTSTRAP -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- BOOSTRAP + TAILWIND -->
    <script>
      tailwind.config = {
        corePlugins: {
          preflight: false, // prevents Tailwind from resetting Bootstrap's styles
        },
      };
    </script>
    <!-- OWN JS — order matters: classes before main -->
    <script src="./js/perferencesPanel.js"></script>
    <script src="./js/mapVis.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
